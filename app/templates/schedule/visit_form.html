{% extends "base.html" %}
{% block title %}Schedule Visit{% endblock %}
{% block content %}
<nav aria-label="breadcrumb"><ol class="breadcrumb mb-3"><li class="breadcrumb-item"><a href="/schedule">Schedule</a></li><li class="breadcrumb-item active">New Visit</li></ol></nav>

<div class="row justify-content-center"><div class="col-12 col-lg-6">
<div class="card border-0 shadow-sm">
    <div class="card-header bg-transparent"><h5 class="mb-0 fw-semibold">Schedule Service Visit</h5></div>
    <div class="card-body">
        <form method="post" action="/schedule/create">
            <div class="mb-3">
                <label class="form-label">Customer <span class="text-danger">*</span></label>
                <select name="customer_id" class="form-select" required>
                    <option value="">Select...</option>
                    {% for c in customers %}
                    <option value="{{ c.id }}" {% if customer_id and customer_id|string == c.id|string %}selected{% endif %}>{{ c.name }} — {{ c.service_zone or '' }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Service Type <span class="text-danger">*</span></label>
                <select name="service_type" class="form-select" required>
                    {% for st in service_types %}<option value="{{ st }}">{{ st }}</option>{% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Date & Time</label>
                <input type="datetime-local" name="scheduled_date" class="form-control" value="{{ date }}T09:00" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Notes</label>
                <textarea name="notes" class="form-control" rows="2"></textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Schedule</button>
                <a href="/schedule" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</div></div>
{% endblock %}
