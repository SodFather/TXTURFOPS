{% extends "base.html" %}
{% block title %}New Invoice{% endblock %}
{% block content %}
<nav aria-label="breadcrumb"><ol class="breadcrumb mb-3"><li class="breadcrumb-item"><a href="/invoices">Invoices</a></li><li class="breadcrumb-item active">New Invoice</li></ol></nav>

<div class="row justify-content-center"><div class="col-12 col-lg-10">
<form method="post" action="/invoices/create">
    <div class="card border-0 shadow-sm mb-3">
        <div class="card-header bg-transparent"><h5 class="mb-0 fw-semibold">New Invoice</h5></div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-12 col-md-6">
                    <label class="form-label">Customer <span class="text-danger">*</span></label>
                    <select name="customer_id" class="form-select" required>
                        <option value="">Select customer...</option>
                        {% for c in customers %}
                        <option value="{{ c.id }}" {% if selected_customer and selected_customer.id == c.id %}selected{% endif %}>{{ c.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-6 col-md-3">
                    <label class="form-label">Due In</label>
                    <div class="input-group"><input type="number" name="due_days" class="form-control" value="30" min="1"><span class="input-group-text">days</span></div>
                </div>
                <div class="col-6 col-md-3">
                    <label class="form-label">Tax Rate</label>
                    <div class="input-group"><input type="number" name="tax_rate" class="form-control" value="0" min="0" step="0.1"><span class="input-group-text">%</span></div>
                </div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm mb-3">
        <div class="card-header bg-transparent d-flex justify-content-between align-items-center">
            <h6 class="mb-0 fw-semibold">Line Items</h6>
            <button type="button" class="btn btn-sm btn-outline-primary" onclick="addItem()"><i class="bi bi-plus-lg me-1"></i>Add</button>
        </div>
        <div class="card-body" id="lineItems">
            <div class="row g-2 mb-2 inv-item" data-idx="0">
                <div class="col-12 col-md-5"><input type="text" name="item_desc_0" class="form-control form-control-sm" placeholder="Description" required></div>
                <div class="col-4 col-md-2"><input type="number" name="item_qty_0" class="form-control form-control-sm" value="1" min="1"></div>
                <div class="col-6 col-md-3"><input type="number" name="item_price_0" class="form-control form-control-sm" step="0.01" placeholder="Price"></div>
                <div class="col-2 col-md-2"><button type="button" class="btn btn-sm btn-outline-danger" onclick="this.closest('.inv-item').remove()"><i class="bi bi-trash"></i></button></div>
            </div>
        </div>
    </div>

    <div class="mb-3"><label class="form-label">Notes</label><textarea name="notes" class="form-control" rows="2"></textarea></div>
    <div class="d-flex gap-2"><button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Create Invoice</button><a href="/invoices" class="btn btn-outline-secondary">Cancel</a></div>
</form>
</div></div>
{% endblock %}
{% block scripts %}
<script>
let idx = 1;
function addItem() {
    const html = document.querySelector('.inv-item').outerHTML.replace(/name="item_(\w+)_\d+"/g, `name="item_$1_${idx}"`);
    const d = document.createElement('div'); d.innerHTML = html;
    const el = d.firstElementChild; el.querySelectorAll('input').forEach(i => {if(i.name.includes('qty')){i.value='1'}else{i.value=''}});
    document.getElementById('lineItems').appendChild(el); idx++;
}
</script>
{% endblock %}
